name: Lint and run Cypress tests

on: [push]

env:
  DO_NOT_TRACK: 1

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run lint
        run: bun run lint
