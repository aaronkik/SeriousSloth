name: PR

on:
  - pull_request

concurrency:
  group: pr-${{ github.event.pull_request.number }}

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  DO_NOT_TRACK: 1
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_SCM_BASE: origin/${{ github.base_ref }}

jobs:
  lint-build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup mise
        uses: jdx/mise-action@v4
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Check affected
        run: turbo run lint build --affected
        env:
          NEXT_PUBLIC_TWITCH_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}

  ci-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - lint-build
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup mise
        uses: jdx/mise-action@v4
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Authenticate with Pulumi Cloud
        uses: pulumi/auth-actions@v1
        with:
          organization: aaronkik
          requested-token-type: urn:pulumi:token-type:access_token:personal
          scope: user:aaronkik
      - name: Check affected tests
        run: turbo run test:ci --affected
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
